name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Windows / Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Record Python runtime
        shell: pwsh
        run: python -c "import sys, platform; print(sys.version); print(platform.platform())"

      - name: Install security tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-security.txt

      - name: Compile Python sources
        shell: pwsh
        run: python -m py_compile hosts_editor.py hostsfileget\source_catalog.py hostsfileget\config_profiles.py tests\test_source_catalog.py tests\test_config_profiles.py tests\test_hosts_editor_logic.py tests\test_gui_smoke.py tests\test_benchmarks.py tests\test_package_manifests.py benchmarks\large_file_benchmark.py scripts\render_package_manifests.py scripts\build_release_artifacts.py scripts\verify_release_artifact.py scripts\check_release_identity.py

      - name: Check release identity
        shell: pwsh
        run: python scripts\check_release_identity.py

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Audit pinned build dependencies
        shell: pwsh
        run: python -m pip_audit -r requirements-build.txt --strict

      - name: Parse PowerShell launcher
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "PythonLauncher.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
