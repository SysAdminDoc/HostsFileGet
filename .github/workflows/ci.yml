name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-security.txt

      - name: Compile Python sources
        shell: pwsh
        run: python -m py_compile hosts_editor.py tests\test_hosts_editor_logic.py

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Audit pinned build dependencies
        shell: pwsh
        run: python -m pip_audit -r requirements-build.txt --strict

      - name: Parse PowerShell launcher
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "PythonLauncher.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
