name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Compile Python sources
        shell: pwsh
        run: python -m py_compile hosts_editor.py tests\test_hosts_editor_logic.py

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Parse PowerShell launcher
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "PythonLauncher.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Build PyInstaller executable
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm HostsFileGet.spec

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist\HostsFileGet.exe"
          $hash = Get-FileHash -Algorithm SHA256 $exe
          "$($hash.Hash)  HostsFileGet.exe" | Set-Content -Encoding ascii "dist\HostsFileGet.exe.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HostsFileGet-windows
          path: |
            dist/HostsFileGet.exe
            dist/HostsFileGet.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @("dist\HostsFileGet.exe", "dist\HostsFileGet.exe.sha256")

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title $tag --notes "Automated HostsFileGet Windows build."
          }
