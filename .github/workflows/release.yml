name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-security.txt

      - name: Compile Python sources
        shell: pwsh
        run: python -m py_compile hosts_editor.py hostsfileget\source_catalog.py hostsfileget\config_profiles.py hostsfileget\shortcuts.py tests\test_source_catalog.py tests\test_config_profiles.py tests\test_hosts_editor_logic.py tests\test_gui_smoke.py tests\test_benchmarks.py tests\test_package_manifests.py tests\test_shortcuts.py tests\test_cli_contracts.py benchmarks\large_file_benchmark.py scripts\render_package_manifests.py scripts\build_release_artifacts.py scripts\verify_release_artifact.py scripts\audit_shortcuts.py scripts\audit_cli_contract.py scripts\check_release_identity.py

      - name: Audit shortcut documentation
        shell: pwsh
        run: python scripts\audit_shortcuts.py

      - name: Audit CLI automation contract
        shell: pwsh
        run: python scripts\audit_cli_contract.py

      - name: Check release identity
        shell: pwsh
        run: python scripts\check_release_identity.py

      - name: Run unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Parse PowerShell launcher
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "PythonLauncher.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Build PyInstaller executable
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm HostsFileGet.spec

      - name: Sign executable when signing certificate is configured
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64)) {
            "No signing certificate configured; leaving HostsFileGet.exe unsigned."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_SIGNING_CERTIFICATE_PASSWORD is required when WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 is set."
          }

          $certPath = Join-Path $env:RUNNER_TEMP "hostsfileget-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes(
            $certPath,
            [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64)
          )

          $windowsKitsBin = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signtool = Get-ChildItem $windowsKitsBin -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            throw "signtool.exe was not found in the Windows SDK."
          }

          & $signtool.FullName sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f $certPath `
            /p $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD `
            dist\HostsFileGet.exe

          Remove-Item -LiteralPath $certPath -Force

      - name: Record Authenticode status
        shell: pwsh
        run: Get-AuthenticodeSignature dist\HostsFileGet.exe | Format-List

      - name: Verify release executable CLI
        shell: pwsh
        run: |
          $version = python -c "import hosts_editor; print(hosts_editor.APP_VERSION)"
          python scripts\verify_release_artifact.py --exe dist\HostsFileGet.exe --expected-version $version

      - name: Generate checksum and package manifest artifacts
        shell: pwsh
        run: |
          $version = python -c "import hosts_editor; print(hosts_editor.APP_VERSION)"
          $tag = if ($env:GITHUB_REF_NAME -like "v*") { $env:GITHUB_REF_NAME } else { "v$version" }
          python scripts\build_release_artifacts.py `
            --exe dist\HostsFileGet.exe `
            --version $version `
            --tag $tag `
            --repository "${{ github.repository }}" `
            --output-dir dist

      - name: Generate SBOM and audit dependencies
        shell: pwsh
        run: python -m pip_audit -r requirements-build.txt --strict --format cyclonedx-json --output dist\HostsFileGet.sbom.cdx.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HostsFileGet-windows
          path: |
            dist/HostsFileGet.exe
            dist/HostsFileGet.exe.sha256
            dist/HostsFileGet.sbom.cdx.json
            dist/HostsFileGet.release-artifacts.json
            dist/HostsFileGet.package-manifests.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @(
            "dist\HostsFileGet.exe",
            "dist\HostsFileGet.exe.sha256",
            "dist\HostsFileGet.sbom.cdx.json",
            "dist\HostsFileGet.release-artifacts.json",
            "dist\HostsFileGet.package-manifests.zip"
          )

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --title $tag --notes "Automated HostsFileGet Windows build."
          }
